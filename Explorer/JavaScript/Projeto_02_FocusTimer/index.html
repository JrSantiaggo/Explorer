<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"  content="temporizador estilo pomodoro">
    <title>Projeto 01</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div id="time">
            <span class="minutes" >25</span>
            <span>:</span>
            <span class="seconds" >00</span>
        </div>

        <div id="controls">
            <button class="play"><img src="images/play-circle.png" alt=""></button>
            <button class="pause hide"><img src="images/pause-circle.png" alt=""></button>
            <button class="stop hide"><img src="images/stop-circle.png" alt=""></button>
            <button class="set"><img src="images/stopwatch.png" alt=""></button>
        </div>

    </main>

    <footer>
        <button class="sound-on hide"><img src="images/volume-medium.png" alt=""></button>
        <button class="sound-off"><img src="images/volume-mute.png" alt=""></button>
    </footer>
    <script src="js/index.js" type="module"></script>
</body>
